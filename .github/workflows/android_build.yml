name: Build Raycash APK

on:
  push:
    branches: [buildcheck] # Le build se lancera dès que tu "push" sur l'une de ces branches

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        # On utilise --debug ici car c'est plus rapide pour un premier test en ligne
        run: flutter build apk --debug 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: raycash-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk